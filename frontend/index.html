<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On-Chain Event Indexer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="app-layout">
        <aside class="sidebar hidden" id="appSidebar">
            <div class="sidebar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>On-Chain Indexer</h1>
            </div>
            <div class="sidebar-header">
                <h2>Addresses</h2>
                <button id="addAddressBtn" class="add-btn" title="Add Address">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="address-list" id="addressList">
            </div>
        </aside>

        <div class="resizer hidden" id="appResizer">
            <div class="resizer-line"></div>
        </div>

        <main class="main-area">
            
            <div id="mainContent" class="main-content">
                <div class="empty-state">
                    <div class="empty-text">
                        <h3>No Address Selected</h3>
                        <p>Select an address from the sidebar or add a new one to start indexing on-chain events.</p>
                    </div>
                    <button id="emptyStateAddBtn" class="primary-btn mt-4">
                        <span>Add First Address</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="addAddressModal" class="modal-overlay hidden">
        <div class="modal-content card glass-effect">
            <div class="modal-header">
                <h2>Add New Address</h2>
                <button id="closeModalBtn" class="close-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            
            <form id="indexerForm" class="input-group" novalidate>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="addressInput" 
                        placeholder="Enter Solana Address" 
                        autocomplete="off"
                        required
                    >
                    <button type="button" id="clearInputBtn" class="clear-input-btn hidden">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div class="input-focus-border"></div>
                </div>

                <div class="filters-container">
                    <div class="filter-group">
                        <label>Time Range</label>
                        <div class="pill-group" id="timeFilters">
                            <button type="button" class="pill" data-value="1">1H</button>
                            <button type="button" class="pill" data-value="8">8H</button>
                            <button type="button" class="pill active" data-value="24">24H</button>
                            <button type="button" class="pill" data-value="48">48H</button>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <label>Max Transactions</label>
                        <div class="pill-group" id="txFilters">
                            <button type="button" class="pill active" data-value="1000">1000</button>
                            <button type="button" class="pill" data-value="2000">2000</button>
                            <button type="button" class="pill" data-value="5000">5000</button>
                        </div>
                    </div>
                </div>

                <div id="statusMessage" class="status-message hidden"></div>

                <button type="button" id="submitBtn" disabled>
                    <span>Analyze</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <div id="globalToast" class="global-toast"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
