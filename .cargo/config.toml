[alias]

wtf = "all -c 'cargo fmt --all && cargo clippy --all-targets --all-features -- -D warnings && cargo test'"
lint = "clippy --all-targets --all-features"

[build]
rustflags = [
    # Линты
    "-W",
    "clippy::all",
    "-W",
    "clippy::pedantic",
    "-W",
    "clippy::nursery",
]

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
 